<!DOCTYPE html>
<html lang="pt-BR">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0"/>
  <title>404 — Serial Experiments Lopes</title>
  <link rel="stylesheet" href="https://cdn.jsdelivr.net/npm/hack-font@3/build/web/hack.css">
  <style>
    *, *::before, *::after {
      margin: 0;
      padding: 0;
      box-sizing: border-box;
    }

    :root {
      --orange: rgba(204, 78, 0, 1);
      --dark: rgba(26, 17, 0, 1);
      --text: rgba(255, 255, 255, 0.85);
      --dim: rgba(255, 255, 255, 0.25);
      --error: rgba(255, 60, 0, 0.7);
    }

    body {
      width: 100%;
      height: 100vh;
      overflow: hidden;
      background: var(--orange);
      color: var(--text);
      font-family: 'Hack', monospace;
      display: flex;
      justify-content: center;
      align-items: center;
      position: relative;
    }

    /* ASCII BG */
    .ascii-bg {
      position: fixed;
      inset: 0;
      width: 100%;
      height: 100%;
      overflow: hidden;
      white-space: pre;
      color: rgba(36, 27, 0, 1);
      font-size: 21px;
      line-height: 20px;
      padding: 10px;
      user-select: none;
      pointer-events: none;
      z-index: 1;
    }

    /* Overlay gradient */
    .overlay {
      position: absolute;
      inset: 0;
      background: linear-gradient(
        to bottom,
        rgba(255, 255, 255, 0.05) 0%,
        rgba(0, 0, 0, 0.10) 25%,
        rgba(26, 17, 0, 0.95) 70%
      );
      z-index: 2;
    }

    /* Scanlines */
    .scanlines {
      position: fixed;
      inset: 0;
      pointer-events: none;
      z-index: 3;
      background: repeating-linear-gradient(
        to bottom,
        transparent 0px,
        transparent 3px,
        rgba(0, 0, 0, 0.04) 3px,
        rgba(0, 0, 0, 0.04) 4px
      );
    }

    /* Main container */
    .container {
      position: relative;
      z-index: 10;
      text-align: center;
      display: flex;
      flex-direction: column;
      align-items: center;
      gap: 0;
    }

    /* Glitch 404 */
    .error-code {
      font-size: 5rem;
      font-weight: 700;
      letter-spacing: 0.4em;
      color: var(--text);
      position: relative;
      display: inline-block;
      animation: flicker 6s infinite;
    }

    .error-code::before,
    .error-code::after {
      content: '404';
      position: absolute;
      top: 0;
      left: 0;
      width: 100%;
      height: 100%;
    }

    .error-code::before {
      color: rgba(255, 80, 0, 0.6);
      clip-path: polygon(0 20%, 100% 20%, 100% 40%, 0 40%);
      transform: translateX(-3px);
      animation: glitch-1 4s infinite;
    }

    .error-code::after {
      color: rgba(0, 200, 255, 0.2);
      clip-path: polygon(0 60%, 100% 60%, 100% 80%, 0 80%);
      transform: translateX(3px);
      animation: glitch-2 4s infinite;
    }

    @keyframes glitch-1 {
      0%, 90%, 100% { transform: translateX(0); opacity: 0; }
      91% { transform: translateX(-4px); opacity: 1; }
      93% { transform: translateX(2px); opacity: 0.6; }
      95% { transform: translateX(0); opacity: 0; }
    }

    @keyframes glitch-2 {
      0%, 92%, 100% { transform: translateX(0); opacity: 0; }
      93% { transform: translateX(4px); opacity: 0.8; }
      95% { transform: translateX(-2px); opacity: 0.4; }
      97% { transform: translateX(0); opacity: 0; }
    }

    @keyframes flicker {
      0%, 97%, 100% { opacity: 1; }
      98% { opacity: 0.7; }
      99% { opacity: 1; }
      99.5% { opacity: 0.5; }
    }

    /* Divider */
    .divider {
      width: 120px;
      height: 1px;
      background: rgba(255, 255, 255, 0.12);
      margin: 14px auto;
    }

    /* Message */
    .message {
      font-size: 0.7rem;
      letter-spacing: 0.18em;
      color: var(--dim);
      margin-bottom: 6px;
      text-transform: lowercase;
    }

    .path-display {
      font-size: 0.65rem;
      letter-spacing: 0.1em;
      color: rgba(255, 120, 60, 0.6);
      margin-bottom: 28px;
      min-height: 1em;
    }

    /* Back link */
    .back-link {
      font-size: 0.7rem;
      letter-spacing: 0.2em;
      color: var(--dim);
      text-decoration: none;
      border-bottom: 1px solid rgba(255,255,255,0.08);
      padding-bottom: 2px;
      transition: color 0.2s, border-color 0.2s;
    }

    .back-link:hover {
      color: var(--text);
      border-color: rgba(255,255,255,0.2);
    }

    /* Terminal blink cursor */
    .cursor {
      display: inline-block;
      width: 7px;
      height: 0.75em;
      background: var(--dim);
      margin-left: 4px;
      vertical-align: middle;
      animation: blink 1.1s step-end infinite;
    }

    @keyframes blink {
      0%, 100% { opacity: 1; }
      50% { opacity: 0; }
    }

    /* Fade-in on load */
    .container {
      animation: fadein 0.8s ease both;
    }

    @keyframes fadein {
      from { opacity: 0; transform: translateY(6px); }
      to   { opacity: 1; transform: translateY(0); }
    }
  </style>
</head>
<body>

  <div class="ascii-bg" id="asciiBg"></div>
  <div class="overlay"></div>
  <div class="scanlines"></div>

  <div class="container">
    <div class="error-code">404</div>
    <div class="divider"></div>
    <p class="message">pasta não encontrada<span class="cursor"></span></p>
    <p class="path-display" id="pathDisplay"></p>
    <a class="back-link" href="/index.html">← voltar</a>
  </div>

  <script>
    /* ── ASCII background (same logic as main page) ── */
    const chars = '░▒▓│┤╡╢╖╕╣║╗╝╜╛┐└┴┬├─┼╞╟╚╔╩╦╠═╬╧╨╤╥╙╘╒╓╫╪┘┌█▄▌▐▀αßΓπΣσµτΦΘΩδ∞∩';
    const bg = document.getElementById('asciiBg');

    function fillAscii() {
      const cols = Math.ceil(window.innerWidth / 12.6) + 2;
      const rows = Math.ceil(window.innerHeight / 20) + 2;
      let out = '';
      for (let r = 0; r < rows; r++) {
        for (let c = 0; c < cols; c++) {
          out += chars[Math.floor(Math.random() * chars.length)];
        }
        out += '\n';
      }
      bg.textContent = out;
    }

    fillAscii();
    setInterval(fillAscii, 120);
    window.addEventListener('resize', fillAscii);

    /* ── Show the bad path ── */
    const pathEl = document.getElementById('pathDisplay');
    const raw = window.location.pathname;
    if (raw && raw !== '/404.html') {
      pathEl.textContent = raw;
    }
  </script>

</body>
</html>
